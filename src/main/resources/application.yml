spring:
  application:
    name: etl-off
  main:
    lazy-initialization: true
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:file:./data/etloff;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

etl:
  csv-path: classpath:open-food-facts.csv
  chunk-size: 1000
  grid-size: 4

server:
  port: 8080

logging:
  level:
    fr.sdv.etloff: INFO
    org.springframework.batch: WARN
